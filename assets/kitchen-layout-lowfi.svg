<svg xmlns="http://www.w3.org/2000/svg" width="3000" height="2000" viewBox="0 0 3000 2000" role="img" aria-labelledby="title desc">
  <title id="title">Kitchen Layout Diagram</title>
  <desc id="desc">Low fidelity kitchen plan with wall dimensions, cabinet blocks, and opening markers.</desc>

  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="7" refY="7" orient="auto-start-reverse">
      <path d="M0,0 L14,7 L0,14 z" fill="#475569"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .frame { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .wall { fill: none; stroke: #0f172a; stroke-width: 8; }
      .cabinet { fill: #e2e8f0; stroke: #64748b; stroke-width: 2; }
      .opening { fill: #fef3c7; stroke: #b45309; stroke-width: 2; }
      .dim { fill: none; stroke: #475569; stroke-width: 3; marker-start: url(#arrow); marker-end: url(#arrow); }
      .guide { fill: none; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 8; }
      .label { font-family: Inter, Arial, sans-serif; fill: #0f172a; font-size: 46px; font-weight: 700; }
      .sub { font-family: Inter, Arial, sans-serif; fill: #334155; font-size: 32px; font-weight: 600; }
      .note { font-family: Inter, Arial, sans-serif; fill: #475569; font-size: 28px; }
      .zone { font-family: Inter, Arial, sans-serif; fill: #1e293b; font-size: 28px; font-weight: 600; }
    </style>
  </defs>

  <rect x="0" y="0" width="3000" height="2000" class="bg"/>
  <rect x="90" y="90" width="2820" height="1820" rx="20" class="frame"/>

  <text x="150" y="190" class="label">Kitchen Layout - Low-Fi Contractor Diagram</text>
  <text x="150" y="245" class="note">Chardonnay model assumptions: main run 14 ft, side run 8 ft, fridge bay back wall 3.0 ft, right return 2.5 ft</text>

  <!-- Main kitchen envelope (scale: 120 px = 1 ft) -->
  <rect x="380" y="400" width="1680" height="960" class="wall"/>

  <!-- Refrigerator bay extension -->
  <rect x="2060" y="880" width="360" height="300" class="wall"/>

  <!-- Cabinet blocks -->
  <rect x="430" y="450" width="1100" height="120" class="cabinet"/>
  <rect x="430" y="620" width="260" height="560" class="cabinet"/>
  <rect x="730" y="1120" width="840" height="120" class="cabinet"/>

  <!-- Openings markers (pass-through + pantry) -->
  <rect x="1590" y="620" width="220" height="90" class="opening"/>
  <text x="1605" y="677" class="note">Pass-through</text>
  <rect x="430" y="1230" width="180" height="100" class="opening"/>
  <text x="445" y="1295" class="note">Pantry opening</text>

  <!-- Internal labels -->
  <text x="860" y="365" class="zone">MAIN CABINET RUN (NORTH WALL)</text>
  <text x="520" y="830" class="zone">SINK / COUNTER ZONE</text>
  <text x="2090" y="835" class="zone">REFRIGERATOR BAY</text>
  <text x="2115" y="980" class="sub">BACK WALL 3.0 ft</text>
  <text x="2200" y="1220" class="sub">RIGHT RETURN 2.5 ft</text>

  <!-- Dimension guides + arrows -->
  <!-- Top width 14 ft -->
  <line x1="380" y1="320" x2="380" y2="400" class="guide"/>
  <line x1="2060" y1="320" x2="2060" y2="400" class="guide"/>
  <line x1="420" y1="320" x2="2020" y2="320" class="dim"/>
  <text x="1120" y="295" class="sub">14.0 ft</text>

  <!-- Left height 8 ft -->
  <line x1="290" y1="400" x2="380" y2="400" class="guide"/>
  <line x1="290" y1="1360" x2="380" y2="1360" class="guide"/>
  <line x1="290" y1="440" x2="290" y2="1320" class="dim"/>
  <text x="210" y="910" class="sub" transform="rotate(-90 210,910)">8.0 ft</text>

  <!-- Bay back wall 3.0 ft -->
  <line x1="2060" y1="1500" x2="2060" y2="1180" class="guide"/>
  <line x1="2420" y1="1500" x2="2420" y2="1180" class="guide"/>
  <line x1="2100" y1="1500" x2="2380" y2="1500" class="dim"/>
  <text x="2190" y="1560" class="sub">3.0 ft</text>

  <!-- Bay right return 2.5 ft -->
  <line x1="2530" y1="880" x2="2420" y2="880" class="guide"/>
  <line x1="2530" y1="1180" x2="2420" y2="1180" class="guide"/>
  <line x1="2530" y1="920" x2="2530" y2="1140" class="dim"/>
  <text x="2600" y="1040" class="sub" transform="rotate(-90 2600,1040)">2.5 ft</text>

  <!-- Legend -->
  <rect x="150" y="1630" width="2700" height="230" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="210" y="1705" class="sub">Legend</text>
  <rect x="210" y="1730" width="50" height="24" class="cabinet"/>
  <text x="280" y="1750" class="note">Cabinet footprint (deduction zone)</text>
  <rect x="210" y="1775" width="50" height="24" class="opening"/>
  <text x="280" y="1795" class="note">Openings (pass-through/pantry) deduction zone</text>
  <line x1="210" y1="1830" x2="290" y2="1830" class="dim"/>
  <text x="320" y="1840" class="note">Dimension callout line (for bid consistency)</text>
</svg>
