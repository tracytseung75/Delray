<svg xmlns="http://www.w3.org/2000/svg" width="3000" height="2000" viewBox="0 0 3000 2000" role="img" aria-labelledby="title desc">
  <title id="title">Kitchen Layout Diagram - Galley</title>
  <desc id="desc">Low fidelity contractor plan based on site photos: galley kitchen with pass-through and appliance wall.</desc>

  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="7" refY="7" orient="auto-start-reverse">
      <path d="M0,0 L14,7 L0,14 z" fill="#475569"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .frame { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .wall { fill: none; stroke: #0f172a; stroke-width: 8; }
      .counter { fill: #e2e8f0; stroke: #64748b; stroke-width: 2; }
      .appliance { fill: #f1f5f9; stroke: #334155; stroke-width: 2; }
      .opening { fill: #fef3c7; stroke: #b45309; stroke-width: 2; }
      .dim { fill: none; stroke: #475569; stroke-width: 3; marker-start: url(#arrow); marker-end: url(#arrow); }
      .guide { fill: none; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 8; }
      .label { font-family: Inter, Arial, sans-serif; fill: #0f172a; font-size: 46px; font-weight: 700; }
      .sub { font-family: Inter, Arial, sans-serif; fill: #334155; font-size: 32px; font-weight: 600; }
      .note { font-family: Inter, Arial, sans-serif; fill: #475569; font-size: 28px; }
      .zone { font-family: Inter, Arial, sans-serif; fill: #1e293b; font-size: 27px; font-weight: 600; }
    </style>
  </defs>

  <rect x="0" y="0" width="3000" height="2000" class="bg"/>
  <rect x="90" y="90" width="2820" height="1820" rx="20" class="frame"/>

  <text x="150" y="190" class="label">Kitchen Layout - Low-Fi Contractor Diagram (Photo-Corrected)</text>
  <text x="150" y="245" class="note">Galley orientation with open entry, pass-through opening, and rear appliance wall. Dimensions are quoting assumptions.</text>

  <!-- Overall kitchen envelope (assumed 14 ft x 8 ft) -->
  <rect x="420" y="420" width="1680" height="960" class="wall"/>

  <!-- Open entry at south side -->
  <rect x="1130" y="1336" width="320" height="88" fill="#ffffff"/>
  <line x1="1130" y1="1336" x2="1450" y2="1336" stroke="#0f172a" stroke-width="8"/>

  <!-- Left run (sink/dishwasher/pass-through side) -->
  <rect x="470" y="510" width="250" height="780" class="counter"/>
  <rect x="490" y="1070" width="210" height="180" class="appliance"/>
  <text x="500" y="1168" class="note">Dishwasher</text>
  <rect x="490" y="850" width="210" height="170" class="appliance"/>
  <text x="560" y="940" class="note">Sink</text>

  <!-- Right run (fridge + counter) -->
  <rect x="1800" y="510" width="250" height="780" class="counter"/>
  <rect x="1820" y="520" width="210" height="290" class="appliance"/>
  <text x="1865" y="680" class="note">Fridge</text>

  <!-- Rear wall appliances/cabinets zone -->
  <rect x="780" y="470" width="930" height="220" class="counter"/>
  <rect x="1145" y="500" width="200" height="170" class="appliance"/>
  <text x="1185" y="595" class="note">Range</text>

  <!-- Pass-through opening on left wall upper zone -->
  <rect x="430" y="560" width="300" height="180" class="opening"/>
  <text x="440" y="660" class="note">Pass-through opening</text>

  <!-- Labels -->
  <text x="1010" y="390" class="zone">REAR APPLIANCE / CABINET WALL</text>
  <text x="500" y="1460" class="zone">LEFT RUN: SINK + DISHWASHER</text>
  <text x="1470" y="1460" class="zone">RIGHT RUN: FRIDGE + COUNTER</text>
  <text x="1165" y="1510" class="sub">OPEN ENTRY</text>

  <!-- Dimension callouts -->
  <!-- Length 14 ft -->
  <line x1="420" y1="340" x2="420" y2="420" class="guide"/>
  <line x1="2100" y1="340" x2="2100" y2="420" class="guide"/>
  <line x1="460" y1="340" x2="2060" y2="340" class="dim"/>
  <text x="1145" y="315" class="sub">14.0 ft (overall length)</text>

  <!-- Width 8 ft -->
  <line x1="330" y1="420" x2="420" y2="420" class="guide"/>
  <line x1="330" y1="1380" x2="420" y2="1380" class="guide"/>
  <line x1="330" y1="460" x2="330" y2="1340" class="dim"/>
  <text x="250" y="940" class="sub" transform="rotate(-90 250,940)">8.0 ft (overall width)</text>

  <!-- Entry opening width approx -->
  <line x1="1130" y1="1470" x2="1130" y2="1338" class="guide"/>
  <line x1="1450" y1="1470" x2="1450" y2="1338" class="guide"/>
  <line x1="1160" y1="1470" x2="1420" y2="1470" class="dim"/>
  <text x="1180" y="1530" class="sub">~2.7 ft entry opening</text>

  <!-- Legend -->
  <rect x="150" y="1630" width="2700" height="230" rx="16" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="210" y="1705" class="sub">Legend</text>
  <rect x="210" y="1730" width="50" height="24" class="counter"/>
  <text x="280" y="1750" class="note">Counter/cabinet footprint</text>
  <rect x="210" y="1775" width="50" height="24" class="appliance"/>
  <text x="280" y="1795" class="note">Appliance footprint (diagrammatic)</text>
  <rect x="1090" y="1775" width="50" height="24" class="opening"/>
  <text x="1160" y="1795" class="note">Opening (pass-through / entry)</text>
  <text x="210" y="1845" class="note">Note: final installer should field-verify all dimensions before material order.</text>
</svg>
