<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Delray</title>
  <style>
    :root { --bg:#f7f4ee; --ink:#1f1f1f; --accent:#1b7f79; }
    body { margin:0; font-family: Georgia, "Times New Roman", serif; background:var(--bg); color:var(--ink); }
    main { min-height:100vh; display:grid; place-items:center; padding:24px; }
    .card { max-width:760px; background:white; border:1px solid #e6dfd2; border-radius:14px; padding:40px; box-shadow:0 8px 30px rgba(0,0,0,.06); }
    h1 { margin:0 0 8px; font-size:clamp(2rem, 4vw, 3rem); }
    p { line-height:1.6; margin:0; }
    .dot { color:var(--accent); }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Delray<span class="dot">.</span></h1>
      <p>Starter page is live locally. Replace this with your production HTML/CSS/JS when ready.</p>
    </section>
  </main>
</body>
</html>
